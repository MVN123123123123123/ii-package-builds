name: Update quickshell-git Spec from PKGBUILD

on:
  workflow_dispatch:

jobs:
  update-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch PKGBUILD and update quickshell-git spec
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          SPEC_FILE="fedora/specs/quickshell-git.spec"
          PKGBUILD_URL="https://raw.githubusercontent.com/end-4/dots-hyprland/main/sdata/dist-arch/illogical-impulse-quickshell-git/PKGBUILD"
          CHANGES_MADE=0

          if [ ! -f "$SPEC_FILE" ]; then
            echo "❌ Error: $SPEC_FILE not found!"
            exit 1
          fi

          echo "========================================"
          echo "Fetching PKGBUILD from end-4/dots-hyprland"
          echo "========================================"

          # Download the PKGBUILD
          PKGBUILD_CONTENT=$(curl -sL "$PKGBUILD_URL")

          if [ -z "$PKGBUILD_CONTENT" ]; then
            echo "❌ Error: Failed to fetch PKGBUILD from $PKGBUILD_URL"
            exit 1
          fi

          echo "$PKGBUILD_CONTENT" | head -5
          echo "..."

          # --- Extract the pinned commit from PKGBUILD ---
          # The PKGBUILD has: _commit='<hash>'
          PKGBUILD_COMMIT=$(echo "$PKGBUILD_CONTENT" | grep -oP "^_commit=['\"]?\K[a-f0-9]+")

          if [ -z "$PKGBUILD_COMMIT" ]; then
            echo "❌ Error: Could not extract _commit from PKGBUILD!"
            echo "  PKGBUILD content (first 20 lines):"
            echo "$PKGBUILD_CONTENT" | head -20
            exit 1
          fi

          echo "  PKGBUILD commit: $PKGBUILD_COMMIT"

          # --- Get current commit from spec ---
          CURRENT_COMMIT=$(grep -m1 -oP '^%global\s+commit\s+\K[a-f0-9]+' "$SPEC_FILE")
          echo "  Current commit:  $CURRENT_COMMIT"

          echo "========================================"

          if [ "$PKGBUILD_COMMIT" != "$CURRENT_COMMIT" ] && [ -n "$CURRENT_COMMIT" ]; then
            echo "🚀 New commit from PKGBUILD detected! Updating spec..."

            # Update the commit line(s) in the spec file
            sed -i -E "s/^(%global\s+commit\s+)[a-f0-9]+/\1$PKGBUILD_COMMIT/" "$SPEC_FILE"

            # --- Optionally fetch upstream version from CMakeLists.txt ---
            CURL_URL="https://git.outfoxxed.me/quickshell/quickshell/raw/commit/$PKGBUILD_COMMIT/CMakeLists.txt"
            UPSTREAM_VER=$(curl -sL "$CURL_URL" | grep -i "project" | grep "VERSION" | sed -n 's/.*VERSION *"\([^"]*\)".*/\1/p')

            if [ -n "$UPSTREAM_VER" ]; then
              echo "  Upstream Version (from CMakeLists.txt): $UPSTREAM_VER"
              sed -i -E "s/^(%global\s+tag\s+).*/\1$UPSTREAM_VER/" "$SPEC_FILE"
            else
              echo "  ⚠️  Could not parse upstream version from CMakeLists.txt. Keeping current tag."
            fi

            # Update snapdate to today
            SNAPDATE=$(date +%Y%m%d)
            echo "  Updating snapdate to: $SNAPDATE"
            sed -i -E "s/^(%global\s+snapdate\s+).*/\1$SNAPDATE/" "$SPEC_FILE"

            # Bump Release to current date timestamp
            TIMESTAMP=$(date +%Y%m%d%H%M)
            echo "  Bumping Release to $TIMESTAMP to trigger build..."
            sed -i -E "s/^Release:.*/Release:        $TIMESTAMP%{?dist}/" "$SPEC_FILE"

            CHANGES_MADE=1
          else
            echo "✅ Commit already matches PKGBUILD. No update needed."
          fi

          echo "========================================"

          if [ "$CHANGES_MADE" -eq 1 ]; then
            git add "$SPEC_FILE"
            echo "Committing and pushing updated quickshell-git spec..."
            git commit -m "chore: auto-update quickshell-git spec to commit $PKGBUILD_COMMIT"

            git pull --rebase origin main
            git push origin main

            echo "✅ Successfully pushed updates."
          else
            echo "No updates needed for quickshell-git."
          fi

